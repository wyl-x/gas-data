<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>油耗记录助手</title>
  <link href="./bootstrap.min.css" rel="stylesheet">
  <style>
      body {
          background-color: #f8f9fa;
          padding-top: 20px;
      }
      .container, input {
          font-size: 12px!important;
      }

      .record-card {
          margin-bottom: 12px;
          border-left: 5px solid #0d6efd;
      }

      .analysis-text {
          font-size: 0.85rem;
          font-weight: bold;
      }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center mb-4">🚗 油耗记录助手</h2>

  <!-- 配置区域 -->
  <div class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <h6 class="card-title">⚙️ 配置</h6>
      <div class="row g-2">
        <div class="col-8">
          <input type="password" id="token" class="form-control form-control-sm" placeholder="GitHub Token">
        </div>
        <div class="col-4">
          <input type="text" id="repo" class="form-control form-control-sm" placeholder="user/repo">
        </div>
        <div class="col-6">
          <input type="number" id="initLiter" class="form-control form-control-sm" placeholder="初始油量(L)">
        </div>
        <div class="col-6">
          <input type="number" id="initMileage" class="form-control form-control-sm" placeholder="初始里程(km)">
        </div>
        <button class="btn btn-sm btn-secondary w-100 mt-2" onclick="saveConfig()">保存并刷新数据</button>
      </div>
    </div>
  </div>

  <!-- 表单区域 -->
  <div class="card mb-4 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">总花费 (元)</label>
          <input oninput="calcLiters()" type="number" id="cost" class="form-control" step="0.01">
        </div>
        <div class="col-6">
          <label class="form-label">优惠 (元)</label>
          <input oninput="calcLiters()" type="number" id="discount" class="form-control" step="0.01">
        </div>
        <div class="col-6">
          <label class="form-label">油价 (元/L)</label>
          <input oninput="calcLiters()" type="number" id="price" class="form-control" step="0.01">
        </div>
        <div class="col-6">
          <label class="form-label">加油量 (L)</label>
          <input type="number" id="liters" class="form-control" step="0.01" placeholder="例: 33">
        </div>
        <div class="col-6">
          <label class="form-label">里程 (km)</label>
          <input type="number" id="mileage" class="form-control" placeholder="例: 40371">
        </div>
        <div class="col-6">
          <label class="form-label">日期</label>
          <input type="text" id="date" class="form-control">
        </div>
        <button class="btn btn-primary w-100 mt-3" onclick="addRecord()">➕ 提交本次加油</button>
      </div>
    </div>
  </div>

  <div id="recordList">
    <div class="text-center text-muted">正在连接仓库...</div>
  </div>
</div>
<script src="./dayjs.min.js"></script>
<script>
  const GITHUB_API = "https://api.github.com/repos";
  let config = JSON.parse(localStorage.getItem('gas_config') || '{}');
  const defaultInitLiter = 33;
  const defaultInitMileage = 40371;
  let initLiter = config.initLiter ?? defaultInitLiter;
  let initMileage = config.initMileage ?? defaultInitMileage;

  // 初始化日期为今天
  document.getElementById('date').value = dayjs().format('YYYY-MM-DD HH:mm:ss');
  document.getElementById('discount').value = 0;
  document.getElementById('mileage').value = initMileage;

  function saveConfig() {
    config.token = document.getElementById('token').value;
    config.repo = document.getElementById('repo').value;
    config.initLiter = parseFloat(document.getElementById('initLiter').value) || defaultInitLiter;
    config.initMileage = parseInt(document.getElementById('initMileage').value) || defaultInitMileage;
    localStorage.setItem('gas_config', JSON.stringify(config));
    initLiter = config.initLiter;
    initMileage = config.initMileage;
    loadRecords();
  }

  async function fetchRepoFile() {
    const url = `${GITHUB_API}/${config.repo}/contents/data.json`;
    const res = await fetch(url, {
      headers: {
        "Authorization": `token ${config.token}`,
        "Accept": "application/vnd.github.v3+json"
      }
    });
    if (res.status === 404) return {content: [], sha: null};
    if (!res.ok) throw new Error("获取数据失败，请检查配置");
    const data = await res.json();
    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
    return {content, sha: data.sha};
  }

  function calcLiters() {
    const price = parseFloat(document.getElementById('price').value);
    const cost = parseFloat(document.getElementById('cost').value);

    const liters = cost / price
    document.getElementById('liters').value = liters.toFixed(2)
  }

  async function addRecord() {
    const price = parseFloat(document.getElementById('price').value);
    const cost = parseFloat(document.getElementById('cost').value);
    const discount = parseFloat(document.getElementById('discount').value);
    const liters = parseFloat(document.getElementById('liters').value);
    const mileage = parseInt(document.getElementById('mileage').value);
    const date = document.getElementById('date').value;

    if (!cost || !price || !liters || !mileage) return alert("请完整填写记录");

    const record = {id: Date.now(), cost, discount, price, liters, mileage, date};
    console.log('record', record)
    try {
      const {content, sha} = await fetchRepoFile();
      content.push(record);
      await updateRepoFile(content, sha);
      alert("同步成功！");
      loadRecords();
    } catch (e) {
      alert(e.message);
    }
  }

  async function updateRepoFile(newContent, sha) {
    const url = `${GITHUB_API}/${config.repo}/contents/data.json`;
    await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `token ${config.token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "gas record update",
        content: btoa(unescape(encodeURIComponent(JSON.stringify(newContent)))),
        sha: sha
      })
    });
  }

  async function deleteRecord(id) {
    if (!confirm("确定删除？")) return;
    const {content, sha} = await fetchRepoFile();
    const filtered = content.filter(r => r.id !== id);
    await updateRepoFile(filtered, sha);
    loadRecords();
  }

  async function loadRecords(firstLoad) {
    if (!config.token || !config.repo) {
      document.getElementById('recordList').innerHTML = "请先配置 GitHub Token 和仓库";
      return;
    }

    try {
      const {content} = await fetchRepoFile();
      // 按里程从低到高排序以计算油耗
      const sorted = content.sort((a, b) => b.mileage - a.mileage);
      if (firstLoad && sorted[0]) {
        document.getElementById('price').value = sorted[0].price
        document.getElementById('mileage').value = sorted[0].mileage
      }
      let analysis = "";

      if (sorted.length > 0) {
        const diffKm = sorted[0].mileage - initMileage;
        const totalLiters = sorted.reduce((result, current) => result + current.liters, initLiter) - sorted[0].liters

        const lastOne = sorted[sorted.length - 1]
        const totalCost = sorted.reduce((result, current) => result + current.cost, initLiter * lastOne.price) - sorted[0].cost
        const lPer100 = ((totalLiters / diffKm) * 100).toFixed(2);
        const costPerKm = (totalCost / diffKm).toFixed(2);
        console.log(diffKm, totalLiters, lPer100, totalCost)
        analysis = `
                        <div class="mt-2 pt-2 border-top d-flex justify-content-between text-primary analysis-text">
                            <span>🚗 ${diffKm} km</span>
                            <span>⛽ ${totalLiters.toFixed(0)} L</span>
                            <span>💰 ${totalCost.toFixed(0)} ¥</span>
                        </div>
                        <div class="mt-2 pt-2 border-top d-flex justify-content-between text-primary analysis-text">
                            <span>⛽ ${lPer100} L/100km</span>
                            <span>💰 ¥${costPerKm} / km</span>
                        </div>
`;
      }

      const html = sorted.slice().map((r, i) => {
        return `
                <div class="card record-card shadow-sm">
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-muted small">${r.date}</span>
                            <button class="btn btn-sm text-danger" onclick="deleteRecord(${r.id})">删除</button>
                        </div>
                        <div class="d-flex justify-content-between align-items-end">
                            <div>
                                <span class="h4 mb-0">¥${r.cost.toFixed(2)}</span>
                                <small class="ms-2 text-muted">${r.liters}L · ${r.mileage}km</small>
                            </div>
                            <span class="badge bg-light text-dark border">¥${r.price}/L</span>
                        </div>
                        ${i === 0 ? analysis : ''}
                    </div>
                </div>`;
      }).join('');

      document.getElementById('recordList').innerHTML = html || "暂无记录，请添加第一条记录";
    } catch (e) {
      document.getElementById('recordList').innerHTML = `<div class="text-danger">${e.message}</div>`;
    }
  }

  if (config.token) {
    document.getElementById('token').value = config.token;
    document.getElementById('repo').value = config.repo;
    document.getElementById('initLiter').value = config.initLiter || defaultInitLiter;
    document.getElementById('initMileage').value = config.initMileage || defaultInitMileage;
    loadRecords(true);
  }

</script>
</body>
</html>
